---
# ============================================
# 1. FIREWALL CONFIGURATION
# ============================================

- name: Set default firewall policies
  ufw:
    policy: "{{ item.policy }}"
    direction: "{{ item.direction }}"
  loop:
    - { policy: 'deny', direction: 'incoming' }
    - { policy: 'allow', direction: 'outgoing' }

- name: Allow required ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '2222'
    - '80'
    - '443'

- name: Enable UFW
  ufw:
    state: enabled

# ============================================
# 2. NETWORK TOOLS
# ============================================

- name: Install network diagnostic tools
  apt:
    name:
      - dnsutils
      - iputils-ping
      - curl
    state: present

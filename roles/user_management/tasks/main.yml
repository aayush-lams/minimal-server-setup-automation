---
# ============================================
# 1. USER CREATION & MANAGEMENT
# ============================================

- name: Create webadmin user with sudo access
  user:
    name: "{{ admin_user }}"
    state: present
    shell: /bin/bash
    groups: sudo
    append: yes
    create_home: yes
    comment: "Web Administrator"

- name: Create auditor user with read-only access
  user:
    name: "{{ guest_user }}"
    state: present
    shell: /bin/bash
    groups: 
      - adm
      - systemd-journal
    append: yes
    create_home: yes
    comment: "System Auditor - Read Only Access"

# ============================================
# 2. PASSWORD POLICIES
# ============================================

- name: Install libpam-pwquality for password quality control
  apt:
    name: libpam-pwquality
    state: present
    update_cache: yes
  register: apt_result
  retries: 5
  delay: 15
  until: apt_result is succeeded

- name: Configure password quality requirements
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password\s+requisite\s+pam_pwquality.so'
    line: 'password        requisite                       pam_pwquality.so retry=3 minlen=5 difok=1'
    backup: yes

- name: Set password aging policies
  lineinfile:
    path: /etc/login.defs
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^PASS_MAX_DAYS', line: 'PASS_MAX_DAYS   90' }
    - { regexp: '^PASS_MIN_DAYS', line: 'PASS_MIN_DAYS   7' }
    - { regexp: '^PASS_WARN_AGE', line: 'PASS_WARN_AGE   14' }

- name: Enforce password history (prevent reuse)
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password\s+required\s+pam_unix.so'
    line: 'password        required                        pam_unix.so remember=5 use_authtok'

# ============================================
# 3. SECURE DEFAULT UMASK
# ============================================

- name: Create custom profile script for umask
  copy:
    content: |
      # System-wide security settings
      umask 027
      
      echo "========================================="
      echo "  Authorized Access Only"
      echo "  All activities are monitored and logged"
      echo "========================================="
    dest: /etc/profile.d/security.sh
    mode: '0644'
    owner: root
    group: root

# ============================================
# 4. AUDITOR PERMISSIONS
# ============================================

- name: Set read-only permissions for logs directory
  file:
    path: /var/log
    state: directory
    mode: '0750'
    owner: root
    group: adm

- name: Set auditor's home directory permissions
  file:
    path: "/home/{{ guest_user }}"
    state: directory
    mode: '0750'
    owner: "{{ guest_user }}"
    group: "{{ guest_user }}"

# ============================================
# 5. LOCK DOWN SSH
# ============================================

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Limit SSH access to specific users
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers'
    line: 'AllowUsers {{ admin_user }} {{ guest_user }}'
  notify: restart ssh

# ============================================
# 6. FILE PERMISSIONS
# ============================================

- name: Set proper permissions on sensitive files
  file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: root
    group: "{{ item.group }}"
  loop:
    - { path: '/etc/shadow',  mode: '0640', group: 'shadow' }
    - { path: '/etc/passwd',  mode: '0644', group: 'root'   }
    - { path: '/etc/group',   mode: '0644', group: 'root'   }
    - { path: '/etc/sudoers', mode: '0640', group: 'root'   }

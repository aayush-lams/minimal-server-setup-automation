---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy Navidrome Nginx config
  ansible.builtin.template:
    src: navidrome.conf.j2
    dest: /etc/nginx/sites-available/navidrome
    mode: '0644'
  notify: reload nginx

- name: Enable Navidrome site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/navidrome
    dest: /etc/nginx/sites-enabled/navidrome
    state: link
  notify: reload nginx

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure Nginx is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes

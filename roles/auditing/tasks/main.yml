---
# ============================================
# 1. INSTALL AUDITD
# ============================================

- name: Install auditd for system auditing
  apt:
    name: auditd
    state: present

# ============================================
# 2. CONFIGURE AUDIT RULES
# ============================================

- name: Configure audit rules for user management
  copy:
    src: user-management.rules
    dest: /etc/audit/rules.d/user-management.rules
  notify: restart auditd

# ============================================
# 3. WEEKLY AUDIT REPORT SCRIPT
# ============================================

- name: Create weekly audit report script
  copy:
    src: audit_report.sh
    dest: /usr/local/bin/audit_report.sh
    mode: '0750'
    owner: root
    group: "{{ guest_user }}"

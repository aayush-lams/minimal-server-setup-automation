- name: Install prerequisites
  apt:
    state: present
    install_recommends: false
    pkg:
      - bridge-utils
      - ca-certificates
      - curl
      - gnupg
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Get Docker GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true
  tags: install_docker

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} \
           signed-by=/etc/apt/keyrings/docker.asc] \
           https://download.docker.com/linux/debian bookworm stable"
    state: present
    update_cache: yes
    filename: docker
  tags: install_docker

- name: Install Docker and related components
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  tags: install_docker

- name: Restart Docker
  systemd:
    name: docker
    state: restarted
    masked: no
    enabled: yes
    ags: install_docker

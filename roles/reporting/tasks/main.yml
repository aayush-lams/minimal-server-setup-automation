---
# ============================================
# 1. REPORTING DIRECTORY
# ============================================

- name: Ensure webadmin has reporting directory
  file:
    path: "/home/{{ admin_user }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0755'

# ============================================
# 2. SYSTEM REPORT SCRIPT
# ============================================

- name: Create system documentation script
  copy:
    src: system_report.sh
    dest: /usr/local/bin/system_report.sh
    mode: '0750'
    owner: root
    group: "{{ admin_user }}"

# ============================================
# 3. INITIAL SYSTEM REPORT
# ============================================

- name: Create initial system report (as webadmin user)
  become_user: "{{ admin_user }}"
  shell: /usr/local/bin/system_report.sh
  args:
    creates: "/home/{{ admin_user }}/system_report.txt"

# ============================================
# 4. STRICT PERMISSIONS ON WEBADMIN HOME
# ============================================

- name: Set strict permissions on webadmin home
  file:
    path: "/home/{{ admin_user }}"
    state: directory
    mode: '0750'
    owner: "{{ admin_user }}"
    group: "{{ guest_user }}"
